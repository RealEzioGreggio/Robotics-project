controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0 #Piu alto piu costoso computazionalmente ma piu reattivo
    min_x_velocity_treshold: 0.0001 # m/s Vel min sulngo x che l'algoritmo considera per triggerare l'algoritmo
    min_y_velocity_treshold: 0.5 #Vel min lungo y che l'algoritmo considera per triggerare l'algoritmo (non si muove lungo y quindi lo metti alto per non far passare il rumore)
    min_theta_velocity_treshold: 0.001 #rad/s
    failure_tolerance: 0.3 #max durata in secondi per la quale questo controller puo fallire
    odom_topic: /bumperbot_controller/odom #Ovviamente dato che generi dei cmd_vel devi prendere il feedback per calcolare l'errore e trovare la nuova azione di controllo
    controller_plugins: ["FollowPath"] #Qui inserisci tutti i controller(plugin) che vuoi utilizzare
    goal_checker_plugins: ["general_goal_checker"] #plugin per controllare se il robot ha raggiunto il goal
    progress_checker_plugin: "progress_checker" #plugin per controllare i progressi fatti dal controller_plugin

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker" #Il progress_checker carichera il plugin specificato in quel package
      require_movement_radius: 0.5 #Distanza minima che il robot deve compiere per considerare i progressi verso il goal
      movement_time_allowance: 10.0 # tempo max in cui il robot si deve muovere di require_movement_radius.
    
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25 
      yaw_tolerance: 0.25
      stateful: true #Controlla la tolelrance dopo aver ruotato 
    #Plugin di default
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_velocity: 0.3
      lookahead_dist: 0.35
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 1.8
      transform_tolerance: 0.2
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 1.0
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_fixed_curvature_lookahead: false
      curvature_lookahead_dist: 1.0
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0
      interpolate_curvature_after_goal: false
      cost_scaling_dist: 0.3
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 3.0 
      

#Ovviamente anche il controller_plugin ha la sua costmap da configurare.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0 #Al contrario della global costmap sara aggiornata con piu rapidita 
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: true
      robot_radius: 0.1 #Questo per dire che l'area occupata dal robot è un cerchio. Difatti lo puoi visualizzare si rviz by topic /published_footprint Polygon
      resolution: 0.005
      always_send_full_costmap: true
      #track_unknown_space: true #true: le unknown cell della mappa(occupancyGrid) rimangono unknwn se false allora vengono trattate come free cell è utile per far navigare il robot in zone sconosciute (autonomous explorationo)
      rolling_window: true #In pratica ha una finestra fissa
      width: 3 #in metri
      height: 3 #In pratical la local costmap è una finestra di 3x3 m^2 fissa sul robot

      #Qui inserisci tutti i plugin che ti interessano.
      #L'ordine è importante perche messi cosi significa che l'obstacle layer scrive sullo static_layer
      plugins: ["obstacle_layer", "inflation_layer"] # Rimuovo lo staticLayer Che non ci serve per la localCostmap

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan #Lidar
        scan: 
          topic: /scan #topic
          data_type: "LaserScan" #Messaggio del topic
          max_obstacle_height: 2.0
          marking: true #Gli ostacoli trovati dal laser saranno segnati sul layer
          clearing: true #ray tracing: tutte le celle attraversate dal raggio del laser che ha trovato l'ostacolo saranno segnate come clear
          combination_method: 1 #Se il layer precedente dice che una cella ha valore 100 e nell'attuale layer hai valore 0 usi il valore piu elevato per quella cella. Vale anche il contrario
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55 #Di quanto gonfi gli ostacoli. Questo parametro include gia robot_radius. Quindi il valore che inserisci deve essere >= robot_radius Quindi di questi 55cm i primi 10(robot_radius) hanno un costo elevatissimo e impediscono cosi al path planner di passare per quelle celle evitando di far incastrare o sbattere il robot contro gli ostacoli 
        cost_scaling_factor: 3.0 




